version: "3.8"

services:
  web:
    build:
      context: .
      dockerfile: infra/Dockerfile.web
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app
    depends_on:
      - api

  api:
    build:
      context: .
      dockerfile: infra/Dockerfile.api
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api:/app
    depends_on:
      - postgres
      - redis
    environment:
      - DATABASE_URL=postgresql+asyncpg://user:password@postgres/javobai
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=your-super-secret-key

  worker:
    build:
      context: .
      dockerfile: infra/Dockerfile.worker
    volumes:
      - ./apps/worker:/app
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://redis:6379/0

  postgres:
    image: pgvector/pgvector:pg16
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=javobai
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
    ports:
      - "5432:5432"

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
