upstream api {
    server api:8000;
}

upstream web {
    server web:3000;
}

server {
    listen 80;
    server_name _;

    # Redirect HTTP -> HTTPS (uncomment in production)
    # return 301 https://$host$request_uri;

    location /api/ {
        proxy_pass http://api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /webhooks/ {
        proxy_pass http://api/webhooks/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 10s;
    }

    # Phase 8 — operator inbox realtime transport. Same-origin on purpose:
    # the browser opens NEXT_PUBLIC_WS_URL=wss://<domain>/ws/inbox directly
    # (a websocket can't be proxied through a Next.js Route Handler), and
    # routing it here instead of a separate api.<domain> host means the
    # dashboard origin never has to expose the bare API host to the browser.
    location /ws/ {
        proxy_pass http://api/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    location / {
        proxy_pass http://web/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;
    }
}
